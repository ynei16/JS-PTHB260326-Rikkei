<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Công Nghệ Của Tôi</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        line-height: 1.6;
        color: #333;
        max-width: 800px;
        margin: 50px auto;
        padding: 20px;
        text-align: center;
      }

      h1 {
        color: #2c7a94;
        margin-bottom: 20px;
      }

      .avatar-container {
        display: flex;
        justify-content: center;
        margin-bottom: 20px;
      }

      img {
        border-radius: 50%;
        border: 2px solid #ddd;
        object-fit: cover;
      }

      hr {
        border: 0;
        border-top: 1px solid #eee;
        margin: 20px 0;
      }

      p {
        font-size: 16px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <h1>Blog Công Nghệ Của Tôi</h1>

    <div class="avatar-container">
      <img
        src="avatar.jpg"
        alt="Ảnh đại diện của Nguyễn Hải Yến"
        width="200"
        height="200"
      />
    </div>

    <hr />

    <p>
      Xin chào mọi người, mình là <strong>Nguyễn Hải Yến</strong>. Chào mừng các
      bạn đến với không gian cá nhân của mình, nơi mình dùng để lưu trữ kiến
      thức và
      <em>thỏa mãn đam mê lập trình giao diện Web mỗi ngày.</em>
    </p>
  </body>
</html>
