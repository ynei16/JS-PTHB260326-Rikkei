<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Học lập trình cùng Tôi - Bài 8</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 1000px;
        margin: 20px auto;
        padding: 20px;
        line-height: 1.6;
      }
      header,
      nav,
      hr {
        margin-bottom: 10px;
      }
      nav a {
        margin-right: 10px;
        color: blue;
        text-decoration: underline;
        font-size: 0.9em;
      }

      /* Chia bố cục thành 2 cột */
      .container {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }
      main {
        width: 65%;
      }
      aside {
        width: 30%;
        padding-left: 20px;
      }

      .banner {
        width: 100%;
        height: auto;
        margin-top: 10px;
      }
      footer {
        margin-top: 40px;
        font-size: 0.8em;
        color: #666;
      }
    </style>
  </head>
  <body>
    <header>
      <h2>Học lập trình cùng Tôi</h2>
      <nav>
        <a href="#">Trang chủ</a>
        <a href="#">Bài viết</a>
        <a href="#">Liên hệ</a>
      </nav>
      <hr />
    </header>

    <div class="container">
      <main>
        <h3>Bài viết mới nhất</h3>
        <article>
          <strong>Lộ trình học Front-end Web</strong>
          <p>Nội dung lộ trình học tập...</p>
        </article>
      </main>

      <aside>
        <strong>Thông tin phụ</strong>
        <p style="font-size: 0.9em; margin-bottom: 5px">
          Quảng cáo các khóa học mới nhất tại Academy.
        </p>

        <img
          src="https://yt3.googleusercontent.com/MLVQOkttiVb8jAoYH5g-gGMbRTPuhaQrQmGaUM_5CudCDqiLBmWuweOJQZTUmgPrb8sD5sLS=s900-c-k-c0x00ffffff-no-rj"
          alt="Banner quảng cáo Rikkei Academy"
          class="banner"
        />
      </aside>
    </div>

    <footer>
      <p>&copy; 2026 Nguyễn Hải Yến - Học viên Rikkei</p>
    </footer>
  </body>
</html>
